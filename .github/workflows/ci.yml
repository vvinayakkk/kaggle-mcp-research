name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          KAGGLE_TOKEN:  ${{ secrets.KAGGLE_TOKEN }}
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
        run: |
          pytest tests/ -v --tb=short --timeout=60

      - name: Check import health
        run: python -c "from kaggle_mcp.server import mcp; print('Server OK, tools:', len(mcp._tools) if hasattr(mcp, '_tools') else 'registered')"
